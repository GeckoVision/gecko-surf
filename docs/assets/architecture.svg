<svg viewBox="0 0 1080 560" role="img" aria-label="Gecko — the API comprehension layer — control plane, never data plane (architecture diagram)" width="1080" height="560" xmlns="http://www.w3.org/2000/svg"><style>@font-face { font-family: 'JetBrains Mono'; font-weight: 400; src: local('JetBrains Mono'), local('JetBrainsMono-Regular'); }
