name: release

# Build the single self-contained `gecko` binary (Solana-CLI pattern: download one
# file, run it, no Python/uv/pip needed) for every supported OS/arch and attach it
# to the GitHub Release when a `v*` tag is pushed.
#
# Asset-name contract (install.sh depends on these EXACT names — do not rename):
#   gecko-linux-x86_64   gecko-linux-arm64   gecko-darwin-x86_64   gecko-darwin-arm64

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write  # attach the binaries to the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04       # linux x86_64 — older glibc (2.35) for portability
            asset: gecko-linux-x86_64
          - runner: ubuntu-22.04-arm   # linux arm64 — older glibc (2.35); GitHub-hosted Arm
            asset: gecko-linux-arm64
          - runner: macos-14           # darwin arm64 (Apple Silicon)
            asset: gecko-darwin-arm64
          # NOTE: Intel-macOS (macos-13, gecko-darwin-x86_64) dropped — GitHub is
          # sunsetting Intel runners; the job queues indefinitely. Intel-Mac users
          # are covered by install.sh's uv fallback. Re-add if a reliable runner returns.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the tagged source with the `serve` extra (mcp + uvicorn) plus the
      # freezer. PyInstaller is built in this ephemeral CI env only — it is NOT a
      # project dependency. certifi is a BUILD requirement, not a wheel dependency:
      # the frozen binary bundles its cacert.pem so https works on machines where
      # the build Python's CA paths don't exist (the darwin-arm64 field blocker).
      #
      # certifi is PINNED to the exact version uv.lock resolves. A bare `pip install
      # certifi` floats to whatever is latest at build time, so two builds of the same
      # tag could bundle different CA snapshots; deriving the pin from the committed
      # lockfile makes the bundled trust store reproducible and lock-governed.
      - name: Install gecko-surf[serve] + pyinstaller + certifi (pinned to uv.lock)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          CERTIFI_VER=$(python -c 'import tomllib;print(next(p["version"] for p in tomllib.load(open("uv.lock","rb"))["package"] if p["name"]=="certifi"))')
          echo "Pinning certifi==$CERTIFI_VER (from uv.lock)"
          python -m pip install ".[serve]" pyinstaller "certifi==$CERTIFI_VER"

      # Flags mirror the locally-proven build exactly. The serve path imports
      # mcp/uvicorn/starlette lazily, so they must be force-collected; pyyaml is a
      # top-level import in gecko.ingest; certifi's cacert.pem is the CA store the
      # gecko_entry hook exports as SSL_CERT_FILE when frozen (no system store needed).
      # gecko.cli is force-collected because the entry imports it inside main() (after
      # the CA hook), not at module scope, so PyInstaller must be told about it explicitly.
      - name: Build standalone binary
        run: |
          pyinstaller --onefile --name gecko \
            --collect-all mcp \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-submodules anyio \
            --collect-data certifi \
            --collect-data gecko \
            --hidden-import yaml \
            --hidden-import gecko \
            --hidden-import gecko.cli \
            --noconfirm \
            packaging/gecko_entry.py

      - name: Stage asset + SHA256SUMS
        shell: bash
        run: |
          mkdir -p out
          cp dist/gecko "out/${{ matrix.asset }}"
          # Cross-platform checksum (sha256sum is Linux-only, shasum is macOS-only);
          # Python is guaranteed present and emits the standard `<hash>  <name>` line.
          python -c "import hashlib,sys,os; p=sys.argv[1]; print(hashlib.sha256(open(p,'rb').read()).hexdigest()+'  '+os.path.basename(p))" \
            "out/${{ matrix.asset }}" > "out/${{ matrix.asset }}.sha256"

      # Smoke the frozen binary on the same machine that built it (no Python needed
      # at runtime — this is the whole promise).
      - name: Smoke test (--help must exit 0)
        shell: bash
        run: |
          chmod +x "out/${{ matrix.asset }}"
          "out/${{ matrix.asset }}" --help

      # TLS smoke: ONE real https GET through the binary's own code path (netguard's
      # pinned HTTPS connect — the exact line that failed on darwin-arm64 in the field
      # when the binary shipped without a CA store). SSL_CERT_FILE/SSL_CERT_DIR are
      # scrubbed so the bundled-certifi hook is what's under test. Target = this repo's
      # own jito spec fixture pinned to the tagged commit (we own it; content can't
      # drift). Gate on the rendered scorecard, NOT the exit code alone: a transport
      # failure escapes `inspect` as a traceback with the same exit 1 that grading
      # semantics use, so only "NN/100" output proves the https fetch succeeded.
      - name: Smoke test (real https through the frozen binary)
        shell: bash
        run: |
          rc=0
          env -u SSL_CERT_FILE -u SSL_CERT_DIR "out/${{ matrix.asset }}" inspect \
            "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/examples/jito/spec/jito_blockengine_openapi.json" \
            > inspect.out 2>&1 || rc=$?
          cat inspect.out
          if [ "$rc" -gt 1 ]; then
            echo "::error::https smoke exited $rc — the frozen binary could not fetch over TLS"
            exit 1
          fi
          if ! grep -q "/100" inspect.out; then
            echo "::error::no scorecard in inspect output — TLS is broken in the frozen binary"
            exit 1
          fi

      # PER-ARCH POSITIVE CA ASSERTION (EVERY matrix leg — this is the macOS + arm64
      # guarantee). The cert-stripped Docker gate below runs ONLY on linux-x86_64: there is
      # no equivalent for macOS-arm64 or linux-arm64 (no matching container to strip; we
      # cannot purge Apple's system trust store on a hosted runner). So on those arches the
      # https smoke above can pass on the runner's OWN cert store even if `--collect-data
      # certifi` shipped nothing — it cannot prove the bundle exists. THIS step can: it runs
      # the binary's hidden self-test (GECKO_CA_SELFTEST=1), which reports IN-PROCESS the
      # bundled certifi it resolved — absolute path, on-disk existence, and byte size — before
      # PyInstaller deletes the _MEIPASS temp dir on exit (so CI can't stat it from outside).
      # The checker then fails the build unless, independent of the runner's cert store, the
      # line proves THIS frozen binary shipped + resolved a real (~200KB) cacert.pem INSIDE
      # _MEIPASS (not a system/keychain path) AND that the frozen CA hook EXPORTED
      # SSL_CERT_FILE to exactly that path (the export belt — ssl_cert_file == path). Physical
      # presence alone can't prove TLS would USE the bundle: a binary can ship the cert yet
      # never point OpenSSL at it. It asserts presence + export, not a TLS handshake — that
      # end-to-end proof stays the linux Docker gate's job, on the one arch where a storeless
      # container is possible.
      - name: CA bundle assertion — bundled certifi shipped + resolved + exported on THIS arch
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "out/${{ matrix.asset }}"
          # Scrub SSL_CERT_FILE/SSL_CERT_DIR so the frozen CA hook's OWN export is what's under
          # test — the export belt asserts ssl_cert_file == the bundled cacert.pem for a frozen
          # binary, and a runner-set store would otherwise win over the hook and read as a false
          # mismatch. certifi.where() is still computed IN-PROCESS, so `path` stays
          # runner-independent; scrubbing only clears a pre-existing override. The binary exits
          # 0 in self-test mode; the checker is the gate.
          env -u SSL_CERT_FILE -u SSL_CERT_DIR GECKO_CA_SELFTEST=1 "out/${{ matrix.asset }}" > ca_selftest.out 2> ca_selftest.err || true
          echo "--- self-test stdout ---"; cat ca_selftest.out || true
          echo "--- self-test stderr ---"; cat ca_selftest.err || true
          python packaging/ca_selftest_check.py ca_selftest.out

      # THE REAL TLS GATE (linux-x86_64 only). The per-runner smoke above can pass on the
      # runner's OWN compiled-in CA path even if `--collect-data certifi` shipped nothing —
      # scrubbing SSL_CERT_FILE/DIR is not enough because OpenSSL then falls back to the
      # runner's default cert dir, which exists on the build machine. So that smoke cannot
      # catch a silently CA-less binary. THIS one can: it runs the freshly-built frozen
      # binary inside a cert-stripped ubuntu:22.04 container (matching the build's glibc)
      # with ca-certificates purged, /etc/ssl/certs + OpenSSL's default dirs emptied, and
      # SSL_CERT_FILE/SSL_CERT_DIR unset. The ONLY possible cert source is then the certifi
      # cacert.pem bundled INSIDE the binary. If the bundle is missing, TLS verification
      # fails, `inspect` prints no "NN/100" scorecard, and this step fails — failing the
      # build, hence the publishes that `needs: build`. This reproduces the reviewers'
      # storeless-machine falsification inside CI. Docker is preinstalled on ubuntu runners.
      - name: TLS gate — real https with NO system CA store (bundle is the only cert source)
        if: matrix.asset == 'gecko-linux-x86_64'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "out/${{ matrix.asset }}"
          SPEC_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/examples/jito/spec/jito_blockengine_openapi.json"
          docker run --rm \
            -e SPEC_URL="$SPEC_URL" \
            -v "$PWD/out:/opt/out:ro" \
            ubuntu:22.04 bash -c '
              set -u
              # Strip EVERY system trust anchor so ONLY a bundled cacert.pem can verify TLS.
              apt-get remove --purge -y ca-certificates >/dev/null 2>&1 || true
              rm -rf /etc/ssl/certs /usr/lib/ssl/certs /etc/ssl/cert.pem \
                     /usr/lib/ssl/cert.pem /usr/local/share/ca-certificates
              rc=0
              env -u SSL_CERT_FILE -u SSL_CERT_DIR \
                /opt/out/${{ matrix.asset }} inspect "$SPEC_URL" > /tmp/inspect.out 2>&1 || rc=$?
              cat /tmp/inspect.out
              if [ "$rc" -gt 1 ]; then
                echo "::error::cert-stripped https smoke exited $rc — the frozen binary cannot do TLS without its bundled certifi (no system CA store present)"
                exit 1
              fi
              if ! grep -q "/100" /tmp/inspect.out; then
                echo "::error::no scorecard from the cert-stripped run — the certifi bundle is absent or broken (THIS is the gate the per-runner smoke could not enforce)"
                exit 1
              fi
              echo "TLS gate passed: https verified with ONLY the bundled certifi, no system CA store present."
            '

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/${{ matrix.asset }}
            out/${{ matrix.asset }}.sha256

  # Wrap the same binaries as npm packages so devs can `npx @geckovision/gecko`.
  # Bundled-binary model (esbuild pattern): one launcher + per-platform packages as
  # optionalDependencies; npm installs only the host's match. Auth is Trusted
  # Publishing (OIDC) — no stored token; see RELEASING.md for the one-time bootstrap.
  publish-npm:
    name: publish npm packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read   # read the release assets (gh release download)
      id-token: write  # OIDC — trusted publishing to npm, no stored token
    steps:
      - uses: actions/checkout@v4

      # NO registry-url: with it, setup-node writes an .npmrc with
      # `_authToken=${NODE_AUTH_TOKEN}`, and since we set no token that empty value
      # SHADOWS OIDC (npm sends the empty token -> E404). Without it, npm finds no
      # configured token and uses OIDC. Default registry is registry.npmjs.org, so
      # scoped @geckovision publishes there with OIDC auth.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"  # >= 22.14, required for OIDC trusted publishing

      # Trusted publishing needs npm >= 11.5.1; guarantee it + log what we got so a
      # future failure is diagnosable (is OIDC even available to the job?).
      - name: Ensure npm supports OIDC
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version) · node $(node --version)"
          echo "OIDC token endpoint present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The build matrix uploaded the binaries to the GitHub Release — pull them back.
      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p out
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern 'gecko-linux-*' --pattern 'gecko-darwin-*' --dir out
          ls -la out

      # Assemble + publish one @geckovision/gecko-<plat> per built binary.
      # An already-published version is a no-op, so re-running the workflow is safe.
      # Auth is OIDC (trusted publishing) — no NODE_AUTH_TOKEN. `npm publish`
      # auto-detects the OIDC environment and also attaches provenance.
      - name: Publish platform packages
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          publish() {  # <package-platform> <binary-asset-name>
            node npm/scripts/make-platform-package.js \
              --platform "$1" --binary "out/$2" --version "$V" --out npm/build
            # Skip ONLY if this exact version already exists (idempotent re-runs);
            # a real publish failure (bad token, network) must fail the job loudly,
            # since npm versions are immutable and a silent miss can't be re-published.
            if npm view "@geckovision/gecko-$1@$V" version >/dev/null 2>&1; then
              echo "skip: @geckovision/gecko-$1@$V already published"
            else
              ( cd "npm/build/gecko-$1" && npm publish --access public )
            fi
          }
          publish linux-x64    gecko-linux-x86_64
          publish linux-arm64  gecko-linux-arm64
          publish darwin-arm64 gecko-darwin-arm64

      # Stamp the launcher's version + optionalDependency pins to the tag, then publish
      # it LAST (so the platform packages it depends on already exist).
      - name: Publish launcher
        run: |
          set -euo pipefail
          export V="${{ steps.ver.outputs.version }}"
          node -e '
            const fs = require("fs"), p = "npm/gecko/package.json";
            const j = JSON.parse(fs.readFileSync(p));
            j.version = process.env.V;
            for (const k of Object.keys(j.optionalDependencies || {})) {
              j.optionalDependencies[k] = "=" + process.env.V;
            }
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '
          if npm view "@geckovision/gecko@$V" version >/dev/null 2>&1; then
            echo "skip: @geckovision/gecko@$V already published"
          else
            ( cd npm/gecko && npm publish --access public )
          fi

  # Publish the Python package (gecko-surf) to PyPI via OIDC Trusted Publishing — no
  # stored token, mirroring publish-npm. PyPI had silently lagged npm (npm 0.4.0 vs
  # PyPI 0.3.0) because publishing was a manual step; this closes that gap so a tag
  # publishes BOTH. Reads the version from pyproject.toml at the tagged commit — bump
  # pyproject BEFORE tagging (the release PR does). One-time: configure a PyPI trusted
  # publisher for gecko-surf (owner GeckoVision, repo gecko-surf, workflow release.yaml).
  #
  # `needs: build` so the TLS gate (a step in `build`) blocks THIS publish too: a tag
  # whose frozen binary can't do TLS must not ship a release on any channel. Re-runs are
  # idempotent (skip-existing), so gating adds no risk.
  publish-pypi:
    name: publish PyPI package
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC — PyPI trusted publishing, no stored token
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel (version from pyproject at the tagged commit)
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # idempotent: re-runs don't fail on an existing version
